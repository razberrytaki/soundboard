name: Bug Report
description: Report a reproducible problem with the soundboard app or its docs.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please provide enough detail for someone else to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Saving a pad with a long name causes the label to overflow the pad card.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Create a board
        3. Add a pad named ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
      placeholder: The pad label should remain within the card and wrap cleanly.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and Version
      description: Include the browser name and exact version if possible.
      placeholder: Firefox 146, Safari 18.4, Chrome 135
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating System
      placeholder: macOS 15.4, Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Include screenshots, logs, or other notes if helpful.
      placeholder: Paste any extra context here.
